version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: william-postgres
    environment:
      POSTGRES_USER: william
      POSTGRES_PASSWORD: william
      POSTGRES_DB: williamos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-schemas.sql:/docker-entrypoint-initdb.d/01-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U william -d williamos"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: william-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: production
    container_name: william-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://william:william@postgres:5432/williamos
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=http://80.225.215.117:3000,http://localhost:3000
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app  # Hot reload in dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── Frontend Web Shell ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend/web
      target: production
    container_name: william-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Celery Worker ────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      target: production
    container_name: william-celery
    environment:
      - DATABASE_URL=postgresql+asyncpg://william:william@postgres:5432/williamos
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=http://80.225.215.117:3000,http://localhost:3000
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker worker -l info -c 2 --max-tasks-per-child=200
    restart: unless-stopped

  # ── Celery Beat (Scheduler) ──────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      target: production
    container_name: william-celery-beat
    environment:
      - DATABASE_URL=postgresql+asyncpg://william:william@postgres:5432/williamos
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=http://80.225.215.117:3000,http://localhost:3000
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.worker beat -l info
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: william-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped

  # ── Loki ─────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.8
    container_name: william-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    restart: unless-stopped

  # ── Promtail ────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.8
    container_name: william-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: william-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme_in_production}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards/json:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: william-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=williamos.duckdns.org
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://williamos.duckdns.org/n8n/
      - N8N_PATH=/n8n/
      - N8N_EDITOR_BASE_URL=https://williamos.duckdns.org/n8n/
    volumes:
      - n8n_data:/home/node/.n8n


volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  loki_data:
  grafana_data:
  n8n_data:


