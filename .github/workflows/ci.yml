name: WILLIAM OS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"   # ← add this

jobs:
  # ── Lint + Type Check ────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]"

      - name: Dependency vulnerability scan
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit --progress-spinner off

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check .

      - name: MyPy type check
        working-directory: backend
        run: mypy app/ --ignore-missing-imports

  # ── Backend Tests ────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: william
          POSTGRES_PASSWORD: william
          POSTGRES_DB: williamos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U william"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Create schemas
        run: |
          PGPASSWORD=william psql -h localhost -U william -d williamos_test -f scripts/init-schemas.sql

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://william:william@localhost:5432/williamos_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: development
          JWT_SECRET_KEY: test-secret-key-at-least-32-bytes-long
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  # ── Docker Build ─────────────────────────────────────────────
  security-baseline:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: william
          POSTGRES_PASSWORD: william
          POSTGRES_DB: williamos_security
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U william"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Create schemas
        run: |
          PGPASSWORD=william psql -h localhost -U william -d williamos_security -f scripts/init-schemas.sql

      - name: Start API server
        env:
          DATABASE_URL: postgresql+asyncpg://william:william@localhost:5432/williamos_security
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: development
          JWT_SECRET_KEY: test-secret-key-at-least-32-bytes-long
          METRICS_ENABLED: true
        run: |
          cd backend
          nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/william-api.log 2>&1 &
          echo $! > /tmp/william-api.pid

      - name: Wait for API readiness
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time" >&2
          cat /tmp/william-api.log || true
          exit 1

      - name: Run security baseline script
        run: bash scripts/security-audit-basics.sh http://localhost:8000

      - name: Stop API server
        if: always()
        run: |
          if [[ -f /tmp/william-api.pid ]]; then
            kill "$(cat /tmp/william-api.pid)" || true
          fi

      - name: Show API log on failure
        if: failure()
        run: cat /tmp/william-api.log || true

  docker:
    runs-on: ubuntu-latest
    needs: security-baseline
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t william-os-backend:${{ github.sha }} ./backend

      - name: Build check
        run: docker images william-os-backend
