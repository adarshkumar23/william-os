name: WILLIAM OS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Lint + Type Check ────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check .

      - name: MyPy type check
        working-directory: backend
        run: mypy app/ --ignore-missing-imports

  # ── Backend Tests ────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: william
          POSTGRES_PASSWORD: william
          POSTGRES_DB: williamos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U william"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Create schemas
        run: |
          PGPASSWORD=william psql -h localhost -U william -d williamos_test -f scripts/init-schemas.sql

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://william:william@localhost:5432/williamos_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: development
          JWT_SECRET_KEY: test-secret-key
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  # ── Docker Build ─────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t william-os-backend:${{ github.sha }} ./backend

      - name: Build check
        run: docker images william-os-backend
